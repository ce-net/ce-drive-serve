# ce-drive-serve — host CE drives over the mesh, gated by ce-cap. Installed + supervised by the one `ce` node via ce-appmgr.

[app]
name    = "ce-drive-serve"
version = "0.1.0"
summary = "CE Drive host: serves the ce-drive/v1 op set over the mesh, authorizing every request against a ce-cap chain."
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"
provides = ["drive"]

[native]
bin = "ce-drive-serve"
[native.artifacts]
"darwin-amd64" = "PLACEHOLDER_darwin_amd64"
"linux-amd64"  = "PLACEHOLDER_linux_amd64"

[deps]
# Local CE node (HTTP API + mesh transport + blobs); host node.key is the capability root.

[sandbox]
tier       = "none"
net        = "loopback"
capability = "inherit"

[daemon]
# Long-running serve loop hosting one or more drives.
enabled = true
args    = []
restart = "on-failure"
